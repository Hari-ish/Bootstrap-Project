<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body {
    background-color: #f5f2ec;
    min-height: 100vh;
  }
</style>
</head>
<body class="d-flex align-items-center py-5">

<div class="container">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-10 col-md-8 col-lg-5">

      <div class="card shadow-sm border-0 p-4 p-sm-5">

        <div class="text-center mb-4">
          <div class="d-inline-flex align-items-center justify-content-center bg-dark text-white rounded-circle mb-2"
               style="width:56px; height:56px;">
            <i class="bi bi-book-half fs-4"></i>
          </div>
          <h2 class="fw-bold text-dark mb-1">Create Account</h2>
          <p class="text-muted small mb-0">Join our community of book lovers today</p>
        </div>

        <form class="needs-validation" novalidate>
          <div class="mb-3">
            <label for="fullName" class="form-label text-secondary small fw-bold">Full Name</label>
            <div class="input-group">
              <span class="input-group-text bg-light text-muted"><i class="bi bi-person"></i></span>
              <input type="text" class="form-control" id="fullName" placeholder="Jane Doe" required>
              <div class="invalid-feedback">Please enter your full name.</div>
            </div>
          </div>


          <div class="mb-3">
            <label for="emailAddress" class="form-label text-secondary small fw-bold">Email Address</label>
            <div class="input-group">
              <span class="input-group-text bg-light text-muted"><i class="bi bi-envelope"></i></span>
              <input type="email" class="form-control" id="emailAddress" placeholder="name@example.com" required>
              <div class="invalid-feedback">Please enter a valid email address.</div>
            </div>
          </div>

          <div class="mb-3">
            <label for="choosePassword" class="form-label text-secondary small fw-bold">Password</label>
            <div class="input-group">
              <span class="input-group-text bg-light text-muted"><i class="bi bi-lock"></i></span>
              <input type="password" class="form-control" id="choosePassword" placeholder="Minimum 8 characters" required minlength="8">
              <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                <i class="bi bi-eye" id="toggleIcon"></i>
              </button>
              <div class="invalid-feedback">Password must be at least 8 characters long.</div>
            </div>
          </div>

          <div class="mb-4 form-check">
            <input type="checkbox" class="form-check-input" id="agreeTerms" required>
            <label class="form-check-label text-muted small" for="agreeTerms">
              I accept the <a href="#" class="text-decoration-none text-dark fw-bold">Terms of Reading</a> &amp; Privacy Policy.
            </label>
            <div class="invalid-feedback">You must agree before signing up.</div>
          </div>

          <button type="submit" class="btn btn-dark w-100 py-2 fw-bold mb-3">
            <i class="bi bi-journal-plus me-2"></i>Open Your Library
          </button>

          <div class="text-center pt-3 border-top">
            <p class="text-muted small mb-0">Already a member?
              <a href="./signin.html" class="text-decoration-none text-dark fw-bold">Sign In</a>
            </p>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
</body>
</html>
